spring:
  application:
    name: smim-backend

  datasource:
    url: jdbc:h2:mem:smim;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # Redis가 없어도 앱이 죽지 않도록 설정 (선택 사항이나, 기본 Redis 설정을 유지하되 연결 실패 로그만 뜨게 둠)

jwt:
  secret: ${JWT_SECRET:secret-key-must-be-very-long-and-secure-for-development-purposes-only}
  access-token-expiration: 3600000 
  refresh-token-expiration: 604800000

gemini:
  api-key: ${GEMINI_API_KEY:dummy-key}
  model: gemini-2.5-flash
  timeout: 30000

logging:
  level:
    com.smim.backend: DEBUG
